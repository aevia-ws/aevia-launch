name: Lighthouse

# Least-privilege: jobs only read the repo; nothing here writes back.
permissions:
  contents: read

on:
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          STRIPE_SECRET_KEY: sk_test_placeholder_for_build
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_for_build
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_build
          RESEND_API_KEY: re_placeholder_for_build
          ANTHROPIC_API_KEY: sk-ant-placeholder_for_build
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_for_build

      - name: Start Next.js server
        run: npm run start &
        env:
          PORT: 3000
          STRIPE_SECRET_KEY: sk_test_placeholder_for_build
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_for_build
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_build
          RESEND_API_KEY: re_placeholder_for_build
          ANTHROPIC_API_KEY: sk-ant-placeholder_for_build
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_for_build

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
