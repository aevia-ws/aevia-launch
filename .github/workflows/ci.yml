name: CI

# Least-privilege: jobs only read the repo; nothing here writes back.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — type check
        run: npx tsc --noEmit
        # next.config.ts sets typescript.ignoreBuildErrors = true, so we run tsc
        # separately to actually surface type errors in CI.

      - name: ESLint
        run: npm run lint
        # next.config.ts sets eslint.ignoreDuringBuilds = true, so we run lint
        # separately before the build.

      - name: Next.js build
        run: npm run build
        env:
          # Placeholder secrets so the build can import Stripe / Resend / Anthropic
          # without hitting real APIs. Values are never used at build time.
          STRIPE_SECRET_KEY: sk_test_placeholder_for_build
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_for_build
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_build
          RESEND_API_KEY: re_placeholder_for_build
          ANTHROPIC_API_KEY: sk-ant-placeholder_for_build
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_for_build

  a11y:
    name: Accessibilité WCAG
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
        env:
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      - name: Run a11y tests
        run: npx playwright test tests/a11y/
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true
